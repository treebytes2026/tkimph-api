services:
  app:
    build: .
    restart: unless-stopped
    env_file: .env.production
    environment:
      RUN_LARAVEL_SETUP: "true"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - storage-data:/var/www/html/storage
      - bootstrap-cache:/var/www/html/bootstrap/cache
    networks:
      - tkimph

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - app
    volumes:
      - .:/var/www/html:ro
      - storage-data:/var/www/html/storage:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - tkimph

  queue:
    build: .
    restart: unless-stopped
    env_file: .env.production
    command: php artisan queue:work redis --sleep=3 --tries=3 --timeout=90
    depends_on:
      - app
      - redis
    volumes:
      - storage-data:/var/www/html/storage
      - bootstrap-cache:/var/www/html/bootstrap/cache
    networks:
      - tkimph

  scheduler:
    build: .
    restart: unless-stopped
    env_file: .env.production
    command: php artisan schedule:work
    depends_on:
      - app
    volumes:
      - storage-data:/var/www/html/storage
      - bootstrap-cache:/var/www/html/bootstrap/cache
    networks:
      - tkimph

  reverb:
    build: .
    restart: unless-stopped
    env_file: .env.production
    command: php artisan reverb:start --host=0.0.0.0 --port=8080
    depends_on:
      - app
      - redis
    volumes:
      - storage-data:/var/www/html/storage
      - bootstrap-cache:/var/www/html/bootstrap/cache
    networks:
      - tkimph

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-tkimph}
      POSTGRES_USER: ${DB_USERNAME:-tkimph}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in .env.production}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-tkimph} -d ${DB_DATABASE:-tkimph}"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - tkimph

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis-data:/data
    networks:
      - tkimph

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - nginx
      - reverb
    networks:
      - tkimph

networks:
  tkimph:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
  caddy-data:
  caddy-config:
  storage-data:
  bootstrap-cache:
